name: Build-Push-Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Build Spring Boot JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build Docker Image (Single Line — Important)
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest .

      # 6️⃣ Push Docker Image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

      # 7️⃣ Deploy to EC2
      - name: Deploy to AWS EC2 using SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest
            docker stop java-docker-app || true
            docker rm java-docker-app || true
            docker run -d -p 8080:8080 --name java-docker-app ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest
            docker ps
