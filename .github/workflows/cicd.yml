name: Build-push-deployed

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest   # Correct runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

      - name: Deploy to AWS EC2 using SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest
            docker stop java-docker-app || true
            docker rm java-docker-app || true
            docker run -d -p 8080:8080 --name java-docker-app ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest
            docker ps
